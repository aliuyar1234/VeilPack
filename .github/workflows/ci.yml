name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Offline Static Enforcement
        run: python checks/offline_enforcement.py

      - name: Test
        run: cargo test --workspace

      - name: Offline Runtime Enforcement
        run: cargo test -p veil-cli --test offline_enforcement

      - name: Boundary Fitness
        run: python checks/boundary_fitness.py

      - name: Compatibility Matrix
        run: python checks/compatibility_matrix_check.py

      - name: Package Release Smoke Test
        run: python checks/package_release_smoke.py

  perf-baseline:
    name: perf-baseline
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Performance Baseline Gate
        run: python checks/perf_harness.py --build --tolerance 0.20 --samples 3

  ci-required:
    name: ci-required
    if: always()
    needs:
      - test
      - perf-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required workflow result
        shell: bash
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "matrix test job did not succeed: ${{ needs.test.result }}" >&2
            exit 1
          fi
          if [ "${{ needs.perf-baseline.result }}" != "success" ]; then
            echo "perf baseline job did not succeed: ${{ needs.perf-baseline.result }}" >&2
            exit 1
          fi
