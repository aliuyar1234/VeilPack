name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$tag" ]; then
            echo "tag must not be empty" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - name: Ensure tag exists
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Resolve tagged commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-list -n 1 "${{ steps.meta.outputs.tag }}")" >> "$GITHUB_OUTPUT"

      - name: Ensure tagged commit passed required CI
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.commit.outputs.sha }}
        shell: bash
        run: |
          ok="$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            -H "Accept: application/vnd.github+json" \
            --jq 'any(.check_runs[]?; .name == "ci-required" and .conclusion == "success")')"
          if [ "$ok" != "true" ]; then
            echo "tagged commit $SHA does not have a successful ci-required check" >&2
            gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              -H "Accept: application/vnd.github+json" \
              --jq '.check_runs[]? | {name, status, conclusion, details_url}'
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG"
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
          fi

  build-assets:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build -p veil-cli --release

      - name: Package release assets
        shell: bash
        run: python scripts/package_release.py --tag "${{ needs.prepare.outputs.tag }}"

      - name: Smoke packaged release artifact
        shell: bash
        run: python checks/release_artifact_smoke.py --tag "${{ needs.prepare.outputs.tag }}"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: "dist/*"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" dist/* --clobber
